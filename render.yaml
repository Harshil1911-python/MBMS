services:
  - type: web
    name: marriage-bureau
    runtime: python
    plan: free

    # Build
    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt

    # Start
    startCommand: >
      flask db upgrade &&
      gunicorn wsgi:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

      - key: FLASK_APP
        value: wsgi.py

      - key: FLASK_ENV
        value: production

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: marriage-bureau-db
          property: connectionString

databases:
  - name: marriage-bureau-db
    plan: free
